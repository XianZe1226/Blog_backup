name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Override config for backup site
        run: |
          sed -i 's|url: https://xianze1226.github.io|url: https://xianze1226.github.io/Blog_backup|' _config.yml
          sed -i 's|href="/css/custom.css"|href="/Blog_backup/css/custom.css"|' _config.butterfly.yml

      - name: Clean and Generate
        run: npx hexo clean && npx hexo generate

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true
